---
# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python in the build environment.
build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - "/bin/bash ./docs/insert-analytics.sh"
    post_install:
      - "pip install poetry"
      # VIRTUAL_ENV needs to be set manually for now.
      # See https://github.com/readthedocs/readthedocs.org/pull/11152/
      - "VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH poetry install --only docs"
    build:
      html:
        # mkdocs.yml defaults to use_directory_urls=False because that is necessary for the static documentation
        # packaged with Nautobot itself.
        # However, for the published docs on ReadTheDocs, we want to explicitly override those flags.
        # Additionally, suppress the warning about mkdocs v2 from various mkdocs plugins (DISABLE_MKDOCS_2_WARNING=true)
        # Additionally, suppress the warning about mkdocs v2 from mkdocs-material (NO_MKDOCS_2_WARNING=1)
        - "DISABLE_MKDOCS_2_WARNING=true NO_MKDOCS_2_WARNING=1 mkdocs build --config-file mkdocs.yml --use-directory-urls --site-dir $READTHEDOCS_OUTPUT/html/"

# MKDocs configuration file
mkdocs:
  configuration: "mkdocs.yml"
  # fail_on_warning: true
