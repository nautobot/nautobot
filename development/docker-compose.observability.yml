---
volumes:
  grafana_data:
  mimir_data:

services:
  loki:
    image: "grafana/loki:2.9.2"
    ports:
      - "3100:3100"
    volumes:
      - "./configs/loki-config.yaml:/etc/loki/loki-config.yaml"
    command: "-config.file=/etc/loki/loki-config.yaml"

  otel:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./configs/otel-collector.yaml:/etc/otel-collector.yaml
    depends_on:
      - "tempo"
      - "mimir"
      - "loki"

  tempo:
    image: grafana/tempo:2.6.1
    command:
      - -config.file
      - /etc/tempo/tempo-config.yaml
    volumes:
      - ./configs/:/etc/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
      - "55680:55680"

  mimir:
    image: grafana/mimir
    command:
      - -config.file=/etc/mimir/mimir-config.yaml
      - -server.grpc-listen-port=9096
    volumes:
      - ./configs/:/etc/mimir
      - ./configs/mimir:/tmp/mimir
    ports:
      - "9009:9009"
      - "9096:9096"

  promtail:
    image: "grafana/promtail:latest"
    volumes:
      - "./configs/promtail.yaml:/etc/promtail/docker-config.yaml"
      - "/var/run/docker.sock:/var/run/docker.sock"
    command: "-config.file=/etc/promtail/docker-config.yaml"

  grafana:
    image: "grafana/grafana:latest"
    ports:
      - "3000:3000"
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./configs/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/all.yml"
      - "./configs/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/all.yml"
      - "./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards"
      - "./configs/grafana/grafana.ini:/etc/grafana/grafana.ini"
    environment:
      - "GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource,volkovlabs-echarts-panel,marcusolsson-dynamictext-panel"
      - "GF_PANELS_DISABLE_SANITIZE_HTML=true"
