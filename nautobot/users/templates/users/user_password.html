{% extends "generic/object_create.html" %}
{% load form_helpers %}

{% block form %}
    <div class="card mb-3">
        <div class="card-header"><strong>Reset Password</strong></div>
        <div class="card-body">
            {% render_form form %}
        </div>
    </div>
{% endblock %}

{% block buttons %}
    <button id="password-action-submit" type="submit" name="_update" class="btn btn-primary">
        <span aria-hidden="true" class="mdi mdi-check me-4"></span><!--
        --><span id="password-action-label">Update Password</span>
    </button>
    <a href="{{ return_url }}" class="btn btn-secondary">
        <span aria-hidden="true" class="mdi mdi-close me-4"></span><!--
        -->Cancel
    </a>
{% endblock %}

{% block javascript %}
    {{ block.super }}
    <script>
        (() => {
            const radios = document.querySelectorAll('input[name="usable_password"]');
            if (!radios.length) {
                return;
            }

            const passwordFields = [
                document.getElementById('id_password1'),
                document.getElementById('id_password2'),
                document.getElementById('id_new_password1'),
                document.getElementById('id_new_password2'),
            ].filter(Boolean);

            const submitLabel = document.getElementById('password-action-label');

            const getFieldRow = (field) => field.closest('.row') || field.closest('.mb-3') || field.parentElement;

            const syncPasswordState = () => {
                const checked = document.querySelector('input[name="usable_password"]:checked');
                const value = checked ? String(checked.value).toLowerCase() : 'true';
                const disablePasswordAuth = value === 'false' || value === '0' || value === 'disabled';

                for (const field of passwordFields) {
                    const row = getFieldRow(field);
                    if (row) {
                        row.classList.toggle('d-none', disablePasswordAuth);
                    }
                    field.disabled = disablePasswordAuth;
                    field.required = !disablePasswordAuth;
                    if (disablePasswordAuth) {
                        field.value = '';
                    }
                }

                if (submitLabel) {
                    submitLabel.textContent = disablePasswordAuth
                        ? 'Disable password-based authentication'
                        : 'Change password';
                }
            };

            radios.forEach((radio) => radio.addEventListener('change', syncPasswordState));
            syncPasswordState();
        })();
    </script>
{% endblock %}
