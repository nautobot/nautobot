{% load helpers %}
<table class="table table-hover nb-table-headings">
    <thead>
        <tr>
            <th>Parent</th>
            <th>Interface</th>
            <th>Type</th>
        </tr>
    </thead>
    <tbody>
        {% for member in object.member_interfaces.all %}
            <tr>
                <td>{{ member.parent|hyperlinked_object }}</td>
                <td>{{ member|hyperlinked_object }}</td>
                <td>{{ member.get_type_display }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="3" class="text-secondary">No member interfaces</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
