{% extends 'generic/object_create.html' %}

{% block form %}
    {% include 'dcim/inc/cable_form.html' %}
{% endblock %}

{% block javascript %}
    {{ block.super }}
    <script>
        // Select2's jQuery custom select2:select/unselect events don't surface as native
        // `change` events that HTMX can observe. Bridge them on the cable's HTMX-driven selects.
        $(document).on("select2:select select2:unselect", "#id_cable_type, select[name$='_type']", function () {
            htmx.trigger(this, "change");
        });
        // Re-initialize Select2 on swapped-in content. We use `htmx:afterSettle` (rather than
        // `htmx:afterSwap`) so HTMX has finished walking the swapped nodes for hx-* attribute
        // processing before select2 init runs — running select2 init too early can leave the
        // underlying <select> without `select2-hidden-accessible`, leaving it visible.
        document.body.addEventListener("htmx:afterSettle", function (evt) {
            window.nb.select2.initializeSelect2Fields(evt.detail.target);
        });
    </script>
{% endblock %}
