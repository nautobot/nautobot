{% load helpers %}
<strong>{{ body_content_table_verbose_name_plural|bettertitle }}</strong>
{% if related_changes_count > 0 %}
    <a href="{% url 'extras:objectchange_list' %}?request_id={{ obj.request_id }}" class="badge bg-primary">
        {% comment %} Add 1 since current record is excluded from count but included in list {% endcomment %}
        {{ related_changes_count|add:1 }}
    </a>
{% else %}
    <span class="badge bg-secondary">0</span>
{% endif %}
