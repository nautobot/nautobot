{% extends base_template %}

{% block content %}
    <div class="card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <strong>Console Log</strong>
                {% if is_running %}
                    <small class="text-secondary">(polling every 2s...)</small>
                {% endif %}
            </div>
            <div>
                <span id="job-status">{% include 'extras/inc/job_label.html' with result=object %}</span>
            </div>
        </div>

        <div id="console-output"
             style="background: #ffffff; color: rgb(0, 0, 0); padding: 10px; height: 600px; overflow-y: auto; font-family: monospace;">
            {% include "extras/inc/jobresult_console_log_lines.html" %}

            {% if is_running %}
                <div
                    id="htmx-poller"
                    hx-get="{% url 'extras:jobresult_console-log' pk=object.pk %}"
                    hx-trigger="every 2s"
                    hx-swap="beforeend"
                    hx-target="#console-output"
                    hx-vals='js:{last_timestamp: getLastTimestamp()}'>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        function getLastTimestamp() {
            const lastLine = document.querySelector(
                '.console-line[data-timestamp]:last-of-type'
            );
            return lastLine?.getAttribute('data-timestamp') ?? '{{ last_timestamp }}';
        }
        function scrollToBottom() {
            const container = document.getElementById('console-output');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

// Initial scroll to bottom on page load
        document.addEventListener('DOMContentLoaded', scrollToBottom);

// Scroll to bottom after HTMX updates
        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.target.id === 'console-output') {
                scrollToBottom();
            }
        });
    </script>
{% endblock %}
